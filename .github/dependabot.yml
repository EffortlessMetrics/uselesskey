version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "rand"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "rand_core"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "rand_chacha"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
