[package]
name = "uselesskey-core-x509"
version = "0.3.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic X.509 policy helpers shared by uselesskey fixture crates."
categories.workspace = true
keywords = ["x509", "deterministic", "fixtures", "certificate", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-x509"
authors.workspace = true

[dependencies]
uselesskey-core-x509-negative = { path = "../uselesskey-core-x509-negative", version = "0.3.0" }
uselesskey-core-x509-derive = { path = "../uselesskey-core-x509-derive", version = "0.3.0" }
uselesskey-core-x509-spec = { path = "../uselesskey-core-x509-spec", version = "0.3.0" }

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
rstest.workspace = true
serde = { workspace = true, features = ["derive"] }
uselesskey-core-seed.workspace = true

[package.metadata.docs.rs]
all-features = true
