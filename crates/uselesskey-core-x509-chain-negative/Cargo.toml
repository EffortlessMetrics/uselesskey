[package]
name = "uselesskey-core-x509-chain-negative"
version = "0.6.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "X.509 chain negative-fixture policy helpers for uselesskey."
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
categories.workspace = true
keywords = ["x509", "fixtures", "negative", "testing", "chain"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-x509-chain-negative"
authors.workspace = true

[dependencies]
uselesskey-core-x509-spec = { path = "../uselesskey-core-x509-spec", version = "0.6.0" }

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
rstest.workspace = true
serde.workspace = true

[features]
default = ["std"]
std = []

[package.metadata.docs.rs]
features = ["std"]

