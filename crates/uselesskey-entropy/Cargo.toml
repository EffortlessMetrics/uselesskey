keywords = ["entropy", "fixtures", "testing", "deterministic", "bytes"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-entropy"
