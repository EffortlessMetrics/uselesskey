[package]
name = "uselesskey-core-symmetric-spec"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Stable symmetric crypto fixture specifications shared across uselesskey crates."
categories.workspace = true
keywords = ["symmetric", "aead", "fixtures", "testing", "deterministic"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-symmetric-spec"
authors.workspace = true

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

[dev-dependencies]
insta.workspace = true

[package.metadata.docs.rs]
all-features = true
