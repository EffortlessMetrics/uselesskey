[package]
name = "uselesskey-test-server"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic OIDC/JWKS HTTP fixture server for uselesskey tests."
categories.workspace = true
keywords = ["oidc", "jwks", "fixtures", "testing", "server"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-test-server"
authors.workspace = true

[dependencies]
axum = { version = "0.8.6", default-features = false, features = ["json", "tokio", "http1"] }
blake3.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["net", "sync", "rt", "macros", "time"] }
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
uselesskey-jwk = { path = "../uselesskey-jwk", version = "0.5.1" }
uselesskey-rsa = { path = "../uselesskey-rsa", version = "0.5.1", features = ["jwk"], default-features = false }

[dev-dependencies]
reqwest = { version = "0.12.24", default-features = false, features = ["json", "rustls-tls"] }
