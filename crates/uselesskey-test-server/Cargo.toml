[package]
name = "uselesskey-test-server"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic OIDC/JWKS HTTP fixture server for integration tests."
categories.workspace = true
keywords = ["oidc", "jwks", "fixtures", "testing", "http"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-test-server"
authors.workspace = true

[dependencies]
blake3.workspace = true
axum = { version = "0.8.6", default-features = false, features = ["http1", "tokio", "json"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "net", "sync"] }
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
uselesskey-jwk = { path = "../uselesskey-jwk", version = "0.5.1" }
uselesskey-rsa = { path = "../uselesskey-rsa", version = "0.5.1", features = ["jwk"] }

[dev-dependencies]
reqwest = { version = "0.12.24", default-features = false, features = ["json", "rustls-tls"] }
