[package]
name = "uselesskey-token"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "API key, bearer, and OAuth access-token fixture generator for tests."
categories.workspace = true
keywords = ["token", "api-key", "oauth", "fixtures", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-token"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.1.0" }
uselesskey-core-token.workspace = true
uselesskey-token-spec.workspace = true

[dev-dependencies]
base64.workspace = true
insta.workspace = true
proptest.workspace = true
serde.workspace = true
serde_json.workspace = true

[package.metadata.docs.rs]
all-features = true
