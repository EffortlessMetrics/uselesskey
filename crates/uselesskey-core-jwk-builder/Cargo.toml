[dependencies]
uselesskey-core-jwk-shape = { path = "../uselesskey-core-jwk-shape", version = "0.1.0" }
uselesskey-core-jwks-order = { path = "../uselesskey-core-jwks-order", version = "0.1.0" }
serde_json.workspace = true

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
serde.workspace = true
serde_json.workspace = true

[package.metadata.docs.rs]
all-features = true
