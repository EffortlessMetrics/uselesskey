[package]
name = "uselesskey-core-jwk-builder"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "JWKS builder with deterministic, stable key ordering."
categories.workspace = true
keywords = ["jwk", "jwks", "fixtures", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-jwk-builder"
