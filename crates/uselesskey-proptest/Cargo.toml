[package]
name = "uselesskey-proptest"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "proptest strategy builders for uselesskey fixtures and negative variants."
categories.workspace = true
keywords = ["proptest", "fixtures", "crypto", "testing", "x509"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-proptest"
authors.workspace = true

[dependencies]
proptest.workspace = true
serde_json.workspace = true
uselesskey = { path = "../uselesskey", version = "0.5.1", features = ["rsa", "ecdsa", "ed25519", "hmac", "token", "x509", "jwk"] }

[dev-dependencies]
proptest.workspace = true

[package.metadata.docs.rs]
all-features = true
