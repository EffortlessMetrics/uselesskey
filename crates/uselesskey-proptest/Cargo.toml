[package]
name = "uselesskey-proptest"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Proptest strategy builders for uselesskey fixtures."
categories.workspace = true
keywords = ["proptest", "fixtures", "crypto", "testing", "x509"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-proptest"
authors.workspace = true

[dependencies]
proptest.workspace = true
serde_json.workspace = true
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
uselesskey-rsa = { path = "../uselesskey-rsa", version = "0.5.1", features = ["jwk"] }
uselesskey-ecdsa = { path = "../uselesskey-ecdsa", version = "0.5.1", features = ["jwk"] }
uselesskey-ed25519 = { path = "../uselesskey-ed25519", version = "0.5.1", features = ["jwk"] }
uselesskey-hmac = { path = "../uselesskey-hmac", version = "0.5.1", features = ["jwk"] }
uselesskey-token = { path = "../uselesskey-token", version = "0.5.1" }
uselesskey-token-spec.workspace = true
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.5.1" }
uselesskey-jwk = { path = "../uselesskey-jwk", version = "0.5.1" }

[dev-dependencies]
proptest.workspace = true

[package.metadata.docs.rs]
all-features = true
