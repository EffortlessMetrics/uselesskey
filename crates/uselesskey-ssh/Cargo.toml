[package]
name = "uselesskey-ssh"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic OpenSSH key and certificate fixtures for infrastructure and deployment tests."
categories.workspace = true
keywords = ["ssh", "openssh", "fixtures", "deterministic", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-ssh"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
ssh-key = { version = "0.6.7", features = ["alloc", "std", "rsa", "ed25519", "getrandom"] }
rand_chacha = "0.3.1"
rand_core = "0.6.4"
rsa09 = { package = "rsa", version = "0.9.10" }

[dev-dependencies]
proptest.workspace = true
