[package]
name = "uselesskey-ssh"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic OpenSSH key and certificate fixtures for infra/deployment tests."
categories.workspace = true
keywords = ["ssh", "openssh", "fixtures", "deterministic", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-ssh"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
ssh-key = { version = "0.7.0-rc.9", default-features = false, features = ["std", "rand_core", "ed25519", "rsa"] }
rand_chacha10.workspace = true
rand_core10.workspace = true

[dev-dependencies]
insta.workspace = true
rstest.workspace = true
