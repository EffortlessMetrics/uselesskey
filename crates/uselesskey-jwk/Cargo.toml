[package]
name = "uselesskey-jwk"
version = "0.5.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Compatibility facade re-exporting typed JWK/JWKS models and builders."
categories.workspace = true
keywords = ["jwk", "jwks", "jwt", "fixtures", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-jwk"
authors.workspace = true

[dependencies]
uselesskey-core-jwk = { path = "../uselesskey-core-jwk", version = "0.5.0" }
uselesskey-core-jwk-builder = { path = "../uselesskey-core-jwk-builder", version = "0.5.0" }

[dev-dependencies]
insta.workspace = true
serde.workspace = true
serde_json.workspace = true

[package.metadata.docs.rs]
all-features = true

