[package]
name = "uselesskey-core-sink"
version = "0.3.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Tempfile-backed artifact sinks used by uselesskey."
categories = ["development-tools::testing"]
keywords = ["fixtures", "tempfile", "testing", "pki", "interop"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-sink"
authors.workspace = true

[dependencies]
tempfile.workspace = true

[dev-dependencies]
proptest.workspace = true
rstest.workspace = true

[package.metadata.docs.rs]
all-features = true
