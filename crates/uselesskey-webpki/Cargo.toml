[package]
name = "uselesskey-webpki"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "webpki trust-anchor and verification helpers for uselesskey X.509 fixtures."
categories.workspace = true
keywords = ["webpki", "x509", "fixtures", "testing", "adapter"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
documentation = "https://docs.rs/uselesskey-webpki"

[dependencies]
webpki = { package = "rustls-webpki", version = "0.103", features = ["std", "ring"] }
rustls-pki-types = { workspace = true }
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.5.1" }

[dev-dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
