[package]
name = "uselesskey-webpki"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "webpki verification helpers for uselesskey X.509 fixtures."
categories.workspace = true
keywords = ["webpki", "x509", "fixtures", "testing", "adapter"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-webpki"
authors.workspace = true

[dependencies]
webpki = { version = "0.22", features = ["alloc"] }
rustls-pki-types = { workspace = true }
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.5.1", optional = true }

[features]
default = ["x509"]
x509 = ["dep:uselesskey-x509"]
all = ["x509"]

[dev-dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.5.1" }
