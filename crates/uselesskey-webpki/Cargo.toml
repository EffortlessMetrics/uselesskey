[package]
name = "uselesskey-webpki"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "rustls-webpki adapter helpers for uselesskey X.509 fixtures."
categories.workspace = true
keywords = ["webpki", "x509", "fixtures", "testing", "adapter"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-webpki"
authors.workspace = true

[dependencies]
rustls-pki-types = { workspace = true }
webpki = { package = "rustls-webpki", version = "0.103", features = ["std", "ring"], optional = true }
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.5.1", optional = true }

[features]
default = ["x509"]
x509 = ["dep:webpki", "dep:uselesskey-x509"]

[package.metadata.docs.rs]
features = ["x509"]

[dev-dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.5.1" }
