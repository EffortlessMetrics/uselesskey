[package]
name = "uselesskey-webpki"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "webpki verification helpers for uselesskey X.509 fixtures."
categories.workspace = true
keywords = ["webpki", "x509", "tls", "fixtures", "adapter"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-webpki"
authors.workspace = true

[dependencies]
rustls-webpki = { version = "0.103", features = ["ring", "std"] }
rustls-pki-types = { workspace = true }
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.5.1" }

[dev-dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
