[package]
name = "uselesskey-webauthn"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic WebAuthn ceremony fixtures for tests."
categories.workspace = true
keywords = ["webauthn", "fido2", "fixtures", "testing", "deterministic"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-webauthn"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
rand_chacha10.workspace = true
rand_core10.workspace = true
blake3.workspace = true
serde.workspace = true
serde_json.workspace = true
base64.workspace = true
thiserror.workspace = true
sha2 = { version = "0.11", features = ["oid"] }
serde_cbor = "0.11"

[dev-dependencies]
insta.workspace = true

[package.metadata.docs.rs]
all-features = true
