[package]
name = "uselesskey-core"
version = "0.6.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Core factory, deterministic derivation, and cache engine for uselesskey test fixtures."
categories.workspace = true
keywords = ["test", "fixtures", "deterministic", "cache", "seeded"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core"
authors.workspace = true

[features]
default = ["std"]
std = [
    "dep:uselesskey-core-sink",
    "thiserror/std",
    "uselesskey-core-factory/std",
    "uselesskey-core-cache/std",
    "uselesskey-core-id/std",
    "uselesskey-core-negative/std",
]

[dependencies]
thiserror = { version = "2.0.18", default-features = false }
uselesskey-core-factory = { path = "../uselesskey-core-factory", version = "0.6.0", default-features = false }
uselesskey-core-sink = { path = "../uselesskey-core-sink", version = "0.6.0", optional = true }

uselesskey-core-cache = { path = "../uselesskey-core-cache", version = "0.6.0", default-features = false }
uselesskey-core-id = { path = "../uselesskey-core-id", version = "0.6.0", default-features = false }
uselesskey-core-negative = { path = "../uselesskey-core-negative", version = "0.6.0", default-features = false }

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
rstest.workspace = true
serde = { workspace = true }

[package.metadata.docs.rs]
features = ["std"]

