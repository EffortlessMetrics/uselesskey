[package]
name = "uselesskey-rustls"
version = "0.3.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "rustls config adapters for uselesskey fixtures with DER conversion re-exports."
categories.workspace = true
keywords = ["rustls", "tls", "fixtures", "testing", "adapter"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-rustls"
authors.workspace = true

[dependencies]
uselesskey-rustls-der.workspace = true
rustls = { version = "0.23", default-features = false, features = ["std", "tls12"], optional = true }

# Needed directly for config trait impl targets
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.3.0", optional = true }

[package.metadata.docs.rs]
features = ["all", "tls-config", "rustls-ring"]

[features]
default = ["x509"]
x509 = ["uselesskey-rustls-der/x509", "dep:uselesskey-x509"]
rsa = ["uselesskey-rustls-der/rsa"]
ecdsa = ["uselesskey-rustls-der/ecdsa"]
ed25519 = ["uselesskey-rustls-der/ed25519"]
all = ["x509", "rsa", "ecdsa", "ed25519"]
server-config = ["dep:rustls", "x509"]
client-config = ["dep:rustls", "x509"]
tls-config = ["server-config", "client-config"]
rustls-ring = ["rustls?/ring"]
rustls-aws-lc-rs = ["rustls?/aws_lc_rs"]

[dev-dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.3.0" }
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.3.0" }
uselesskey-rsa = { path = "../uselesskey-rsa", version = "0.3.0" }
uselesskey-ecdsa = { path = "../uselesskey-ecdsa", version = "0.3.0" }
uselesskey-ed25519 = { path = "../uselesskey-ed25519", version = "0.3.0" }
rustls = { version = "0.23", features = ["ring"] }
rustls-pki-types = "1"
hex = "0.4"
serde.workspace = true
insta.workspace = true
