[package]
name = "uselesskey-webhook"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic webhook fixture generation for GitHub, Stripe, and Slack signatures."
categories.workspace = true
keywords = ["webhook", "hmac", "fixtures", "testing", "deterministic"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-webhook"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
serde_json.workspace = true
hmac = "0.12"
sha2 = "0.10"

[dev-dependencies]
proptest.workspace = true
