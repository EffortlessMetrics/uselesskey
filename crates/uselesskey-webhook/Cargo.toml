[package]
name = "uselesskey-webhook"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic webhook fixtures for GitHub, Stripe, and Slack tests."
categories.workspace = true
keywords = ["webhook", "hmac", "fixtures", "testing", "deterministic"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-webhook"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
blake3.workspace = true
hex.workspace = true
hmac.workspace = true
sha2.workspace = true

[dev-dependencies]
serde_json.workspace = true

[package.metadata.docs.rs]
all-features = true
