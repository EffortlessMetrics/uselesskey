[package]
name = "uselesskey-native-tls"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "native-tls adapter traits for uselesskey X.509 fixtures."
categories.workspace = true
keywords = ["native-tls", "tls", "fixtures", "testing", "adapter"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-native-tls"
authors.workspace = true

[dependencies]
native-tls = { version = "0.2", optional = true }
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.5.1", optional = true }

[features]
default = ["x509"]
x509 = ["dep:native-tls", "dep:uselesskey-x509"]

[package.metadata.docs.rs]
features = ["x509"]

[dev-dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.5.1" }
