[package]
name = "uselesskey-cli"
version = "0.5.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Manifest and export helpers for handing uselesskey fixtures to secret tooling."
categories.workspace = true
keywords = ["secrets", "fixtures", "export", "vault", "kubernetes"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-cli"
authors.workspace = true

[dependencies]
base64.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml = "0.9.34"
thiserror.workspace = true

[dev-dependencies]
insta.workspace = true
tempfile.workspace = true
jsonschema = "0.37.1"

[package.metadata.docs.rs]
all-features = true
