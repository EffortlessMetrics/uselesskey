[package]
name = "uselesskey-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "CLI for deterministic uselesskey fixtures for non-Rust test stacks"
authors.workspace = true

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
base64.workspace = true

uselesskey-core = { path = "../uselesskey-core", version = "0.5.1" }
uselesskey-rsa = { path = "../uselesskey-rsa", version = "0.5.1", features = ["jwk"] }
uselesskey-ecdsa = { path = "../uselesskey-ecdsa", version = "0.5.1", features = ["jwk"] }
uselesskey-ed25519 = { path = "../uselesskey-ed25519", version = "0.5.1", features = ["jwk"] }
uselesskey-hmac = { path = "../uselesskey-hmac", version = "0.5.1", features = ["jwk"] }
uselesskey-token = { path = "../uselesskey-token", version = "0.5.1" }
uselesskey-token-spec = { path = "../uselesskey-token-spec", version = "0.5.1" }
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.5.1" }
uselesskey-jwk = { path = "../uselesskey-jwk", version = "0.5.1" }

[dev-dependencies]
insta.workspace = true
tempfile.workspace = true
