[package]
name = "uselesskey-core-x509-derive"
version = "0.4.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic X.509 derivation helpers for uselesskey fixture crates."
categories.workspace = true
keywords = ["x509", "deterministic", "serial", "time", "fixtures"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-x509-derive"
authors.workspace = true

[dependencies]
uselesskey-core-hash = { workspace = true }
rand_chacha10.workspace = true
rand_core10.workspace = true
rcgen = "0.13"
time = "0.3"
uselesskey-core-seed.workspace = true

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
serde = { workspace = true, features = ["derive"] }
uselesskey-core-hash = { workspace = true }

[package.metadata.docs.rs]
all-features = true
