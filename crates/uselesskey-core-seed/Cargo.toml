[package]
name = "uselesskey-core-seed"
version = "0.3.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Seed parsing and redaction primitives for uselesskey."
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
categories.workspace = true
keywords = ["fixtures", "seed", "determinism", "testing", "crypto"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-seed"
authors.workspace = true

[dependencies]
blake3 = { version = "1.8.3", default-features = false }
rand_chacha10.workspace = true
rand_core10.workspace = true

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
rstest.workspace = true
serde.workspace = true

[features]
default = ["std"]
std = ["blake3/std", "rand_chacha10/std"]

[package.metadata.docs.rs]
features = ["std"]
